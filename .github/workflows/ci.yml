name: Senior Dev Accelerator CI/CD

on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  APP_NAME: senior-dev-accelerator-ui

jobs:
  build-test-docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-package-lock --no-audit --no-fund --registry=https://registry.npmjs.org/

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit

      - name: Integration tests
        run: npm run test:integration

      - name: Build production
        run: npm run build

      - name: Read version
        id: version
        run: |
          if [ -f VERSION ]; then
            VERSION=$(cat VERSION)
          else
            VERSION="dev-${GITHUB_SHA::7}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Docker build
        run: |
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            docker build \
              -t $APP_NAME \
              -t ${{ secrets.DOCKER_USERNAME }}/$APP_NAME:latest .
          else
            docker build -t $APP_NAME .
          fi

      - name: Docker Hub login
        if: github.ref == 'refs/heads/main'
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Docker push latest
        if: github.ref == 'refs/heads/main'
        run: docker push ${{ secrets.DOCKER_USERNAME }}/$APP_NAME:latest
