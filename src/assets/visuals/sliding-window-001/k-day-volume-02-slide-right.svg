<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520"><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#081827"/><stop offset="1" stop-color="#132b44"/></linearGradient><linearGradient id="accent" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#38bdf8"/><stop offset="1" stop-color="#8b5cf6"/></linearGradient></defs><rect width="900" height="520" rx="32" fill="url(#bg)"/><text x="48" y="62" fill="#eaf6ff" font-family="Inter,Arial" font-size="30" font-weight="800">Slide the fixed K-day window</text><text x="48" y="100" fill="#9fb7cc" font-family="Inter,Arial" font-size="18">Remove the outgoing day, add the incoming day.</text><g transform="translate(58 160)"><rect x="0" y="170" width="100" height="90" rx="18" fill="#0e2030" stroke="#253f57"/><rect x="122" y="210" width="100" height="50" rx="18" fill="#10263a" stroke="#27445d"/><rect x="244" y="50" width="100" height="210" rx="18" fill="#10263a" stroke="#27445d"/><rect x="366" y="210" width="100" height="50" rx="18" fill="#10263a" stroke="#27445d"/><rect x="488" y="130" width="100" height="130" rx="18" fill="#0e2030" stroke="#253f57"/><rect x="610" y="170" width="100" height="90" rx="18" fill="#0e2030" stroke="#253f57"/><rect x="108" y="32" width="372" height="252" rx="26" fill="none" stroke="url(#accent)" stroke-width="8"/><text x="37" y="152" fill="#64788c" font-family="Inter,Arial" font-size="30" font-weight="800">2</text><text x="159" y="192" fill="#eaf6ff" font-family="Inter,Arial" font-size="30" font-weight="800">1</text><text x="281" y="32" fill="#eaf6ff" font-family="Inter,Arial" font-size="30" font-weight="800">5</text><text x="403" y="192" fill="#eaf6ff" font-family="Inter,Arial" font-size="30" font-weight="800">1</text><text x="525" y="112" fill="#64788c" font-family="Inter,Arial" font-size="30" font-weight="800">3</text><path d="M72 122 C86 78, 116 62, 160 68" fill="none" stroke="#f97316" stroke-width="6" stroke-linecap="round"/><text x="28" y="112" fill="#fdba74" font-family="Inter,Arial" font-size="18" font-weight="800">remove 2</text><path d="M438 122 C474 84, 504 68, 544 74" fill="none" stroke="#22c55e" stroke-width="6" stroke-linecap="round"/><text x="492" y="64" fill="#86efac" font-family="Inter,Arial" font-size="18" font-weight="800">add 1</text></g><rect x="54" y="430" width="792" height="52" rx="18" fill="#0d2234" stroke="#28435b"/><text x="80" y="463" fill="#eaf6ff" font-family="Inter,Arial" font-size="20" font-weight="700">Next window: 8 - 2 + 1 = 7. maxSum stays 8.</text></svg>