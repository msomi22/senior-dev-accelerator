<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 820" role="img" aria-labelledby="title desc">
  <title id="title">Factorial recursion walkthrough</title>
  <desc id="desc">A beginner-friendly two-column recursion visual. The left column shows call stack descent. The right column shows return unwinding. Step boxes reveal in order.</desc>
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      .page { fill: #f8f9fa; }
      .card { fill: #ffffff; stroke: #edf0f3; stroke-width: 2; filter: url(#softShadow); }
      .big { fill: #fff9db; stroke: #ffec99; stroke-width: 3; }
      .title { font: 800 26px system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #d9480f; }
      .body { font: 500 20px system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #333333; }
      .h { font: 900 26px system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; letter-spacing: .03em; }
      .blue { fill: #4263eb; } .teal { fill: #0ca678; }
      .sub { font: 500 17px system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #666666; }
      .boxText { font: 800 22px system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      .boxSmall { font: 800 21px system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      .descentBox { fill: #eef2ff; stroke: #c7d2fe; stroke-width: 3; }
      .returnBox { fill: #e6fcf5; stroke: #96f2d7; stroke-width: 3; }
      .baseBox { fill: #ebfbee; stroke: #8ce99a; stroke-width: 3; }
      .descentText { fill: #4263eb; } .returnText { fill: #0ca678; } .baseText { fill: #2b8a3e; }
      .arrow { stroke-width: 4; stroke-linecap: round; stroke-dasharray: 8 10; fill: none; opacity: .42; }
      .step { opacity: .08; transform: translateY(-12px); animation: reveal 12s infinite both; }
      .s1 { animation-delay: .8s; } .s2 { animation-delay: 2.0s; } .s3 { animation-delay: 3.2s; } .s4 { animation-delay: 4.4s; }
      .s5 { animation-delay: 5.8s; } .s6 { animation-delay: 7.0s; } .s7 { animation-delay: 8.2s; } .s8 { animation-delay: 9.4s; }
      .status { opacity: 0; animation: status 12s infinite both; font: 800 21px system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #495057; }
      .m0 { animation-delay: 0s; } .m1 { animation-delay: .8s; } .m2 { animation-delay: 2.0s; } .m3 { animation-delay: 3.2s; } .m4 { animation-delay: 4.4s; }
      .m5 { animation-delay: 5.8s; } .m6 { animation-delay: 7.0s; } .m7 { animation-delay: 8.2s; } .m8 { animation-delay: 9.4s; }
      .btn { fill: #f1f3f5; } .next { fill: #4263eb; } .btnText { font: 900 18px system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      .faded { fill: #adb5bd; } .white { fill: #ffffff; }
      .pulse { animation: pulse 12s infinite both; transform-origin: center; }
      @keyframes reveal { 0%, 3% { opacity: .08; transform: translateY(-12px); } 9%, 94% { opacity: 1; transform: translateY(0); } 100% { opacity: .08; transform: translateY(-12px); } }
      @keyframes status { 0%, 7% { opacity: 1; } 8%, 100% { opacity: 0; } }
      @keyframes pulse { 0%, 75% { opacity: 0; transform: scale(.92); } 80%, 94% { opacity: 1; transform: scale(1); } 100% { opacity: 0; transform: scale(.92); } }
    </style>
  </defs>

  <rect class="page" width="1000" height="820"/>
  <rect class="card" x="50" y="36" width="900" height="748" rx="20"/>

  <rect class="big" x="82" y="68" width="836" height="118" rx="12"/>
  <text class="title" x="112" y="112">💡 Big idea</text>
  <text class="body" x="112" y="150">Recursion breaks a problem into smaller copies, solves the smallest one,</text>
  <text class="body" x="112" y="176">then builds the answer back up as calls return.</text>

  <text class="h blue" x="120" y="246">CALL STACK (DESCENT)</text>
  <text class="sub" x="120" y="276">We keep calling the function with smaller inputs.</text>

  <text class="h teal" x="560" y="246">UNWINDING (RETURN)</text>
  <text class="sub" x="560" y="276">We return and build the result back up.</text>

  <path class="arrow" d="M290 335 V554" stroke="#4263eb"/>
  <path class="arrow" d="M735 554 V335" stroke="#0ca678"/>

  <g class="step s1">
    <rect class="descentBox" x="100" y="305" width="360" height="66" rx="10"/>
    <text class="boxText descentText" x="124" y="346">1. fact(4)</text>
    <text class="boxSmall descentText" x="390" y="346">4!</text>
  </g>
  <g class="step s2">
    <rect class="descentBox" x="100" y="390" width="360" height="66" rx="10"/>
    <text class="boxText descentText" x="124" y="431">2. fact(3)</text>
    <text class="boxSmall descentText" x="390" y="431">3!</text>
  </g>
  <g class="step s3">
    <rect class="descentBox" x="100" y="475" width="360" height="66" rx="10"/>
    <text class="boxText descentText" x="124" y="516">3. fact(2)</text>
    <text class="boxSmall descentText" x="390" y="516">2!</text>
  </g>
  <g class="step s4">
    <rect class="baseBox" x="100" y="560" width="360" height="66" rx="10"/>
    <text class="boxText baseText" x="124" y="601">✓ Base case: return 1</text>
  </g>

  <g class="step s8">
    <rect class="returnBox" x="540" y="305" width="360" height="66" rx="10"/>
    <text class="boxText returnText" x="564" y="346">fact(4) = 4 × 6</text>
    <text class="boxSmall returnText" x="828" y="346">= 24</text>
  </g>
  <g class="step s7">
    <rect class="returnBox" x="540" y="390" width="360" height="66" rx="10"/>
    <text class="boxText returnText" x="564" y="431">fact(3) = 3 × 2</text>
    <text class="boxSmall returnText" x="842" y="431">= 6</text>
  </g>
  <g class="step s6">
    <rect class="returnBox" x="540" y="475" width="360" height="66" rx="10"/>
    <text class="boxText returnText" x="564" y="516">fact(2) = 2 × 1</text>
    <text class="boxSmall returnText" x="842" y="516">= 2</text>
  </g>
  <g class="step s5">
    <rect class="returnBox" x="540" y="560" width="360" height="66" rx="10"/>
    <text class="boxText returnText" x="564" y="601">fact(1) = 1</text>
    <text class="boxSmall returnText" x="858" y="601">1</text>
  </g>

  <rect x="82" y="662" width="836" height="1.5" fill="#eeeeee"/>
  <rect class="btn" x="102" y="692" width="118" height="48" rx="10"/>
  <text class="btnText faded" x="132" y="724">← Back</text>
  <rect class="next" x="780" y="692" width="118" height="48" rx="10"/>
  <text class="btnText white" x="810" y="724">Next →</text>

  <text class="status m0" x="308" y="723">Click Next to begin calling fact(4)</text>
  <text class="status m1" x="322" y="723">Push fact(4) to the call stack.</text>
  <text class="status m2" x="248" y="723">fact(4) needs fact(3). Push fact(3) to the stack.</text>
  <text class="status m3" x="248" y="723">fact(3) needs fact(2). Push fact(2) to the stack.</text>
  <text class="status m4" x="236" y="723">fact(2) needs fact(1). Base case reached! Return 1.</text>
  <text class="status m5" x="318" y="723">Pop fact(1) off the stack. It returned 1.</text>
  <text class="status m6" x="282" y="723">Pop fact(2). Calculate 2 × 1 = 2 and return it.</text>
  <text class="status m7" x="282" y="723">Pop fact(3). Calculate 3 × 2 = 6 and return it.</text>
  <text class="status m8" x="258" y="723">Pop fact(4). Calculate 4 × 6 = 24. Done!</text>

  <g class="pulse">
    <rect x="365" y="202" width="270" height="42" rx="21" fill="#fff4e6" stroke="#ffd8a8" stroke-width="2"/>
    <text class="sub" x="393" y="229">Down first. Up second.</text>
  </g>
</svg>
