<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Animated factorial recursion call stack</title>
  <desc id="desc">Calls descend down the left call stack until the base case, then return values unwind upward on the right.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.16"/></filter>
    <linearGradient id="blueCard" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#eff6ff"/><stop offset="1" stop-color="#bfdbfe"/></linearGradient>
    <linearGradient id="purpleCard" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#f5f3ff"/><stop offset="1" stop-color="#ddd6fe"/></linearGradient>
    <linearGradient id="greenCard" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#ecfdf5"/><stop offset="1" stop-color="#bbf7d0"/></linearGradient>
    <linearGradient id="returnCard" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#f0fdfa"/><stop offset="1" stop-color="#ccfbf1"/></linearGradient>
    <marker id="blueArrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto"><path d="M1,1 L12,7 L1,13 Z" fill="#1d4ed8"/></marker>
    <marker id="tealArrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto"><path d="M1,1 L12,7 L1,13 Z" fill="#0f766e"/></marker>
    <style>
      .bg{fill:#fffaf0}.panel{fill:rgba(255,255,255,.68);stroke:#e5d3b3;stroke-width:3}.title{font:900 34px system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;letter-spacing:.04em}.desc-title{fill:#1e3a8a}.return-title{fill:#0f766e}.card-text{font:900 38px system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#0f172a}.small{font:800 21px system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#475569}.hand{font:italic 700 24px 'Comic Sans MS','Segoe UI',sans-serif}.number{font:900 34px system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:white}.call-card,.return-card,.base-card,.note,.path-dot{opacity:0}.down-arrow,.up-arrow{opacity:0;stroke-width:6;stroke-linecap:round;stroke-dasharray:10 10}.call-card{animation:show 9.6s infinite both}.down-arrow{animation:showStroke 9.6s infinite both}.base-card{animation:show 9.6s infinite both}.return-card{animation:show 9.6s infinite both}.up-arrow{animation:showStroke 9.6s infinite both}.note{animation:show 9.6s infinite both}.path-dot{animation:dot 9.6s infinite both}.c4{animation-delay:.2s}.a43{animation-delay:.9s}.c3{animation-delay:1.3s}.a32{animation-delay:2.0s}.c2{animation-delay:2.4s}.a21{animation-delay:3.1s}.c1{animation-delay:3.5s}.abase{animation-delay:4.0s}.base{animation-delay:4.4s}.r1{animation-delay:5.1s}.u12{animation-delay:5.6s}.r2{animation-delay:6.0s}.u23{animation-delay:6.5s}.r3{animation-delay:6.9s}.u34{animation-delay:7.4s}.r4{animation-delay:7.8s}.note1{animation-delay:8.3s}.d1{animation-delay:.5s}.d2{animation-delay:1.3s}.d3{animation-delay:2.1s}.d4{animation-delay:2.9s}.d5{animation-delay:3.7s}.d6{animation-delay:5.1s}.d7{animation-delay:5.9s}.d8{animation-delay:6.7s}.d9{animation-delay:7.5s}@keyframes show{0%,2%{opacity:0;transform:translateY(-10px)}8%,88%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(0)}}@keyframes showStroke{0%,3%{opacity:0;stroke-dashoffset:60}12%,88%{opacity:1;stroke-dashoffset:0}100%{opacity:0;stroke-dashoffset:0}}@keyframes dot{0%,2%{opacity:0;transform:scale(.5)}8%,74%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(1)}}
    </style>
  </defs>
  <rect class="bg" width="1280" height="720"/><rect class="panel" x="28" y="24" width="1224" height="672" rx="30"/>
  <text class="title desc-title" x="84" y="82">CALL STACK (DESCENT)</text><text class="title return-title" x="710" y="82">UNWINDING (RETURN)</text>
  <g class="call-card c4" filter="url(#shadow)"><rect x="72" y="112" width="360" height="78" rx="18" fill="url(#blueCard)" stroke="#2563eb" stroke-width="4"/><circle cx="122" cy="151" r="30" fill="#2563eb"/><text class="number" x="111" y="164">4</text><text class="card-text" x="182" y="164">fact(4)</text></g>
  <path class="down-arrow a43" d="M252 198 V244" stroke="#1d4ed8" marker-end="url(#blueArrow)"/><text class="hand desc-title a43 down-arrow" x="84" y="229">calls itself</text>
  <g class="call-card c3" filter="url(#shadow)"><rect x="72" y="252" width="360" height="78" rx="18" fill="url(#blueCard)" stroke="#2563eb" stroke-width="4"/><circle cx="122" cy="291" r="30" fill="#2563eb"/><text class="number" x="111" y="304">3</text><text class="card-text" x="182" y="304">fact(3)</text></g>
  <path class="down-arrow a32" d="M252 338 V384" stroke="#1d4ed8" marker-end="url(#blueArrow)"/><text class="hand desc-title a32 down-arrow" x="84" y="369">calls itself</text>
  <g class="call-card c2" filter="url(#shadow)"><rect x="72" y="392" width="360" height="78" rx="18" fill="url(#purpleCard)" stroke="#7c3aed" stroke-width="4"/><circle cx="122" cy="431" r="30" fill="#7c3aed"/><text class="number" x="111" y="444">2</text><text class="card-text" x="182" y="444">fact(2)</text></g>
  <path class="down-arrow a21" d="M252 478 V524" stroke="#1d4ed8" marker-end="url(#blueArrow)"/><text class="hand desc-title a21 down-arrow" x="84" y="509">calls itself</text>
  <g class="call-card c1" filter="url(#shadow)"><rect x="72" y="532" width="360" height="78" rx="18" fill="url(#purpleCard)" stroke="#7c3aed" stroke-width="4"/><circle cx="122" cy="571" r="30" fill="#7c3aed"/><text class="number" x="112" y="584">1</text><text class="card-text" x="182" y="584">fact(1)</text></g>
  <path class="down-arrow abase" d="M450 571 H508" stroke="#1d4ed8" marker-end="url(#blueArrow)"/>
  <g class="base-card base" filter="url(#shadow)"><rect x="512" y="532" width="188" height="78" rx="18" fill="url(#greenCard)" stroke="#16a34a" stroke-width="4"/><circle cx="552" cy="571" r="28" fill="#16a34a"/><text class="number" x="541" y="584">✓</text><text class="small" x="590" y="563">base case:</text><text class="small" x="590" y="590">return 1</text></g>
  <g class="return-card r1" filter="url(#shadow)"><rect x="752" y="532" width="394" height="78" rx="18" fill="url(#returnCard)" stroke="#14b8a6" stroke-width="4"/><text class="card-text" x="792" y="584">fact(1) = 1</text></g>
  <path class="up-arrow u12" d="M950 524 V478" stroke="#0f766e" marker-end="url(#tealArrow)"/><text class="hand return-title u12 up-arrow" x="990" y="506">returns</text>
  <g class="return-card r2" filter="url(#shadow)"><rect x="752" y="392" width="394" height="78" rx="18" fill="url(#returnCard)" stroke="#14b8a6" stroke-width="4"/><text class="card-text" x="792" y="444">fact(2) = 2 × 1 = 2</text></g>
  <path class="up-arrow u23" d="M950 384 V338" stroke="#0f766e" marker-end="url(#tealArrow)"/><text class="hand return-title u23 up-arrow" x="990" y="366">returns</text>
  <g class="return-card r3" filter="url(#shadow)"><rect x="752" y="252" width="394" height="78" rx="18" fill="url(#returnCard)" stroke="#14b8a6" stroke-width="4"/><text class="card-text" x="792" y="304">fact(3) = 3 × 2 = 6</text></g>
  <path class="up-arrow u34" d="M950 244 V198" stroke="#0f766e" marker-end="url(#tealArrow)"/><text class="hand return-title u34 up-arrow" x="990" y="226">returns</text>
  <g class="return-card r4" filter="url(#shadow)"><rect x="752" y="112" width="394" height="78" rx="18" fill="url(#returnCard)" stroke="#14b8a6" stroke-width="4"/><text class="card-text" x="792" y="164">fact(4) = 4 × 6 = 24</text></g>
  <g class="note note1"><rect x="468" y="100" width="210" height="96" rx="20" fill="#fff7ed" stroke="#fdba74" stroke-width="3"/><text class="small" x="492" y="132">Push calls</text><text class="small" x="492" y="160">going down.</text><text class="small" x="492" y="188">Pop returns up.</text></g>
  <circle class="path-dot d1" cx="580" cy="256" r="13" fill="#4f46e5"/><circle class="path-dot d2" cx="604" cy="284" r="13" fill="#4f46e5"/><circle class="path-dot d3" cx="628" cy="314" r="13" fill="#4f46e5"/><circle class="path-dot d4" cx="652" cy="344" r="13" fill="#4f46e5"/><circle class="path-dot d5" cx="676" cy="374" r="13" fill="#16a34a"/><circle class="path-dot d6" cx="704" cy="344" r="13" fill="#0f766e"/><circle class="path-dot d7" cx="732" cy="314" r="13" fill="#0f766e"/><circle class="path-dot d8" cx="760" cy="284" r="13" fill="#0f766e"/><circle class="path-dot d9" cx="788" cy="256" r="13" fill="#0f766e"/>
  <text class="hand desc-title" x="560" y="232">go down</text><text class="hand return-title" x="742" y="232">come back up</text>
</svg>
