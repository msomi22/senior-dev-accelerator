<style>
.bg{fill:#07111f}.panel{fill:#0b1728;stroke:#1e3a5f;stroke-width:2}.lane{fill:rgba(255,255,255,.1);stroke:rgba(148,163,184,.2)}.lane2{fill:rgba(34,197,94,.16)}.grid{stroke:rgba(148,163,184,.18);stroke-width:2;stroke-dasharray:8 10}.dash{stroke:rgba(203,213,225,.45);stroke-width:4;stroke-dasharray:34 20}.pill{fill:#0b4a9f}.text{fill:#dbeafe;font:800 24px Inter,Arial}.pos{fill:#e2e8f0;font:900 24px Inter,Arial}.title{fill:#38bdf8;font:900 34px Inter,Arial}.muted{fill:#a9bdd3;font:800 20px Inter,Arial}.dp{fill:#f8fafc;font:900 25px monospace}.frog{font:44px Apple Color Emoji,Segoe UI Emoji}.ring{fill:rgba(34,197,94,.24);animation:bob 1.1s ease-in-out infinite}.goal{fill:rgba(34,197,94,.16);stroke:rgba(34,197,94,.6);stroke-width:3}.ob{fill:#ef4444}.x{fill:white;font:900 40px Arial}@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
