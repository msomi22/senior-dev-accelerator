<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .road { fill:#0f172a; opacity:0.92; }
    .lane { stroke:#475569; stroke-width:4; stroke-dasharray:18 18; }
    .obstacle { fill:#ef4444; }
    .safe { fill:#10b981; }
    .frog { font: 52px sans-serif; }
    .label { fill:#e2e8f0; font: 700 22px sans-serif; }
    .title { fill:#38bdf8; font: 800 34px sans-serif; }
    .dp { fill:#f8fafc; font: 700 24px monospace; }

    .frogMove {
      animation: jump 5s ease-in-out infinite;
    }

    .pulse {
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes jump {
      0% { transform: translate(0px, 0px); }
      20% { transform: translate(180px, 0px); }
      40% { transform: translate(360px, -90px); }
      60% { transform: translate(540px, 90px); }
      80% { transform: translate(720px, 0px); }
      100% { transform: translate(900px, 0px); }
    }

    @keyframes pulse {
      0%,100% { opacity:0.5; }
      50% { opacity:1; }
    }
  </style>

  <rect width="1200" height="420" rx="28" class="road"/>

  <text x="60" y="58" class="title">Minimum Sideway Jumps — Visual DP Intuition</text>

  <line x1="120" y1="130" x2="1100" y2="130" class="lane"/>
  <line x1="120" y1="210" x2="1100" y2="210" class="lane"/>
  <line x1="120" y1="290" x2="1100" y2="290" class="lane"/>

  <text x="40" y="138" class="label">Lane 1</text>
  <text x="40" y="218" class="label">Lane 2</text>
  <text x="40" y="298" class="label">Lane 3</text>

  <rect x="320" y="98" width="48" height="64" rx="12" class="obstacle pulse"/>
  <rect x="540" y="178" width="48" height="64" rx="12" class="obstacle pulse"/>
  <rect x="760" y="258" width="48" height="64" rx="12" class="obstacle pulse"/>

  <rect x="1010" y="90" width="70" height="220" rx="18" class="safe" opacity="0.18"/>

  <g class="frogMove">
    <text x="150" y="228" class="frog">🐸</text>
  </g>

  <text x="70" y="370" class="dp">DP states evolve: [1,0,1] → [∞,0,1] → [2,∞,1] → [2,3,∞] → [2,3,3]</text>
</svg>